name: render-svg

on:
  workflow_dispatch:
    inputs:
      svg_url:
        description: 'Public URL of SVG to render'
        required: true
        type: string
      png_path:
        description: 'R2 key for output PNG (e.g. worldcups/v4.png)'
        required: true
        type: string
      width:
        description: 'Output width in pixels (default 1366)'
        required: false
        type: string
        default: '1366'
      height:
        description: 'Output height in pixels (default 768)'
        required: false
        type: string
        default: '768'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: |
          npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Render SVG to PNG
        env:
          SVG_URL: ${{ inputs.svg_url }}
          WIDTH: ${{ inputs.width }}
          HEIGHT: ${{ inputs.height }}
        run: node render.js

      - name: Upload PNG to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: diva-cards
          R2_KEY: ${{ inputs.png_path }}
        run: node upload-r2.js
